name: Validate Documentation

on:
  push:
    branches: [main, develop]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'tools/validate_doc*'
      - 'pyproject.toml'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'tools/validate_doc*'
      - 'pyproject.toml'
  workflow_dispatch:

jobs:
  validate-docs:
    name: Validate Documentation Quality
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install requests

    - name: Validate internal links (blocking)
      run: python tools/validate_doc_links.py README.md docs/

    - name: Validate version consistency and code syntax (blocking)
      run: python tools/validate_docs.py

    - name: Validate external links (non-blocking)
      run: python tools/validate_doc_links.py --external --timeout 15 README.md docs/
      continue-on-error: true
