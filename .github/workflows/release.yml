name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 8.0.45)'
        required: true
        type: string

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_VERSION: ${{ github.event.inputs.version }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Validate version format
      run: |
        if [[ ! "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "Error: Version must be in format X.Y.Z"
          exit 1
        fi

    - name: Check version matches pyproject.toml
      run: |
        current_version=$(grep '^version = ' pyproject.toml | sed 's/version = "//' | sed 's/"//')
        if [ "$current_version" != "$RELEASE_VERSION" ]; then
          echo "Error: pyproject.toml version ($current_version) != input ($RELEASE_VERSION)"
          exit 1
        fi

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install mcli
      run: pip install -e .

    - name: Generate release notes
      run: |
        mcli self release-notes \
          --version "$RELEASE_VERSION" \
          --repo-url "https://github.com/gwicho38/mcli" \
          -o release_notes.md

    - name: Create git tag
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git tag -a "v${RELEASE_VERSION}" -m "Release v${RELEASE_VERSION}"
        git push origin "v${RELEASE_VERSION}"

    - name: Save release notes to docs
      run: |
        mkdir -p docs/releases
        cp release_notes.md "docs/releases/${RELEASE_VERSION}.md"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.event.inputs.version }}
        name: MCLI v${{ github.event.inputs.version }}
        body_path: release_notes.md
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
