name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint-and-format:
    name: Lint and Format Check
    runs-on: [self-hosted, linux, x64]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]

    - name: Check code formatting with Black
      run: python -m black --check --diff src/

    - name: Check import sorting with isort
      run: python -m isort --check-only --diff src/

    - name: Check for hardcoded strings
      run: python tools/lint_hardcoded_strings.py --check-all --json
      continue-on-error: true  # Non-blocking until codebase refactoring is complete (13k+ violations)

    - name: Type checking with mypy (full codebase)
      run: python -m mypy src/ --ignore-missing-imports
      continue-on-error: true  # Non-blocking due to type errors in remaining modules

    - name: Type checking with mypy (priority modules)
      run: |
        # Check priority modules that have improved type annotations (issue #40)
        # These modules have fewer errors and are gradually being fully typed
        python -m mypy src/mcli/lib/logger/logger.py src/mcli/lib/custom_commands.py --ignore-missing-imports
      continue-on-error: true  # Non-blocking until all function signatures are typed

  test-rust:
    name: Test Rust Extensions
    runs-on: [self-hosted, linux, x64]
    continue-on-error: true  # Non-blocking: macOS has LLVM version mismatch, tests pass on Ubuntu
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]  # self-hosted linux

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Rust format check
      run: |
        cd mcli_rust
        cargo fmt --all -- --check

    - name: Rust clippy
      run: |
        cd mcli_rust
        cargo clippy -- -D warnings || cargo clippy || echo "Warning: Clippy found issues, continuing"
      continue-on-error: ${{ matrix.os == 'macos-latest' }}

    - name: Rust tests
      run: |
        cd mcli_rust
        cargo test

  test-python:
    name: Test Python Package
    runs-on: [self-hosted, linux, x64]
    # pandas/pydot are now in [dev], so this job gates on real failures (#169).
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]  # self-hosted linux
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        # Self-hosted runners have no passwordless sudo and already ship build
        # tooling; use non-interactive sudo and never fail the job on this step.
        if sudo -n true 2>/dev/null; then
          sudo -n apt-get update && sudo -n apt-get install -y build-essential libpq-dev
        else
          echo "::warning::Skipping apt-get (no passwordless sudo); assuming build-essential/libpq-dev present on self-hosted runner"
        fi

    - name: Install system dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew install postgresql@16

    - name: Set up Rust (for building extensions)
      uses: dtolnay/rust-toolchain@stable

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install maturin
        # Self-hosted runners persist site-packages across runs. A stale,
        # non-editable `mcli` left in the interpreter's site-packages shadows
        # the editable install below (Python imports the real package dir before
        # the .pth-based editable entry), so tests run against old code and fail
        # to import newly-added symbols. Force-remove any prior install first so
        # the editable checkout is the only `mcli` on sys.path.
        pip uninstall -y mcli mcli-framework 2>/dev/null || true
        pip install -e .[dev]
        # Self-hosted runner: pip falls back to --user installs, whose console
        # scripts (maturin, mcli, pytest) land in user-base/bin, not on PATH.
        echo "$(python -m site --user-base)/bin" >> "$GITHUB_PATH"

    - name: Build Rust extensions
      run: |
        cd mcli_rust
        maturin develop --release || maturin develop || echo "Warning: Rust extension build failed, continuing without extensions"
      continue-on-error: ${{ matrix.python-version == '3.12' }}

    - name: Run Python tests with coverage
      run: |
        python -m pytest tests/ -v --tb=short --cov=src/mcli --cov-report=xml --cov-report=term-missing

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Test CLI functionality
      run: |
        # python -m: editable-install console script may not be on PATH on the
        # self-hosted runner (pip --user fallback), but the module always is.
        python -m mcli self version
        python -m mcli --help
        python -m mcli self --help

  integration-test:
    name: Integration Tests
    runs-on: [self-hosted, linux, x64]
    continue-on-error: true  # Non-blocking: Rust-Python integration depends on optional extensions
    if: always()  # Run even if test-python or test-rust fail
    needs: [test-python, test-rust]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Create virtual environment
      run: |
        python -m venv .venv
        echo "VIRTUAL_ENV=${{ github.workspace }}/.venv" >> $GITHUB_ENV
        echo "${{ github.workspace }}/.venv/bin" >> $GITHUB_PATH

    - name: Install dependencies
      run: |
        .venv/bin/python -m pip install --upgrade pip
        .venv/bin/pip install maturin
        .venv/bin/pip install -e .[dev]

    - name: Build Rust extensions
      id: rust_build
      run: |
        cd mcli_rust
        if maturin develop --release; then
          echo "rust_available=true" >> $GITHUB_OUTPUT
        elif maturin develop; then
          echo "rust_available=true" >> $GITHUB_OUTPUT
        else
          echo "rust_available=false" >> $GITHUB_OUTPUT
          echo "Warning: Rust extension build failed"
        fi
      continue-on-error: true

    - name: Test Rust-Python integration
      if: steps.rust_build.outputs.rust_available == 'true'
      run: |
        .venv/bin/python -c "
        import mcli_rust
        print('✅ Rust extensions imported successfully')

        # Test TF-IDF
        vectorizer = mcli_rust.TfIdfVectorizer()
        docs = ['hello world', 'rust is fast', 'python integration']
        vectors = vectorizer.fit_transform(docs)
        print(f'✅ TF-IDF: Generated {len(vectors)} vectors')

        # Test File Watcher
        watcher = mcli_rust.FileWatcher()
        print('✅ File Watcher: Created successfully')

        # Test Command Matcher
        matcher = mcli_rust.CommandMatcher()
        print('✅ Command Matcher: Created successfully')

        # Test Process Manager
        manager = mcli_rust.ProcessManager()
        print('✅ Process Manager: Created successfully')

        print('🎉 All Rust extensions working!')
        "

    - name: Test CLI basic functionality
      run: |
        .venv/bin/mcli self version
        .venv/bin/mcli --help
        .venv/bin/mcli health

  build-package:
    name: Build Distribution Package
    runs-on: [self-hosted, linux, x64]
    if: always()  # Run even if tests fail
    needs: [lint-and-format, test-python, test-rust, integration-test]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build maturin
        # Ensure --user console scripts (maturin) are on PATH on self-hosted runner
        echo "$(python -m site --user-base)/bin" >> "$GITHUB_PATH"

    - name: Build Rust extensions
      run: |
        cd mcli_rust
        maturin build --release

    - name: Build Python package
      run: |
        python -m build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist-packages
        path: |
          dist/
          mcli_rust/target/wheels/
        retention-days: 7
